<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efekty na obrazach</title>
    <style>
        header, footer {
            background-color: indigo;
            color: white;
            font-style: italic;
            padding: 2px;
        }
        * {
            font-family: serif;
            text-align: center;
        }
        #blok1, #blok2, #blok3, #blok4 {
            width: 50%;
            height: 470px;
        }
        img {
            padding: 3px;
            margin: 10px;
            border: dashed 2px slateblue;
            max-width: 80%; /* Dodane dla responsywności */
        }
        .przycisk-styl {
            background-color: slateblue;
            color: white;
            border: none;
            padding: 10px 20px;   
            margin-top: 10px;
            cursor: pointer;
        }
        .przycisk-styl:hover {
            background-color: indigo;
        }
        #main1, #main2 {
            display: flex;
        }
        a {
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <h2>Efekty na obrazach</h2>
    </header>

    <section id="main1">
        <section id="blok1">
            <img src="pszczola.jpg" alt="pszczoła na fioletowym kwiatku" id="img1">

            <br>

            <input type="radio" name="filtr" value="blur">Blur

             <br>

            <input type="radio" name="filtr" value="sepia">Sepia

             <br>

            <input type="radio" name="filtr" value="invert">Negatyw 

            <br>

            <input type="button" value="Zastosuj" class="przycisk-styl" onclick="zastosujFiltr1()">

        </section>

        <section id="blok2">
            <img src="pomarancza.jpg" alt="drzewo pomarańczy" id="img2">

            <br>

            <input type="button" value="Kolorowy" class="przycisk-styl" onclick="ustawKolor()">

            <br>

            <input type="button" value="Czarno-biały" class="przycisk-styl" onclick="ustawCzarnoBialy()">

        </section>
    </section>
    
    <section id="main2">

        <section id="blok3">

            <img src="owoce.jpg" alt="kosz pełen owoców" id="img3">

            <br>

            <input type="range" id="suwakPrzezroczystosc" min="0" max="100" value="100">

            <input type="button" value="Zastosuj" class="przycisk-styl" onclick="zastosujPrzezroczystosc()">

        </section>

        <section id="blok4">

            <img src="zolw.jpg" alt="żółw w wodzie" id="img4">

            <br>

            <input type="range" id="suwakJasnosc" min="0" max="250" value="100">

            <input type="button" value="Zastosuj" class="przycisk-styl" onclick="zastosujJasnosc()">
            
        </section>
    </section>

    <footer>
        <a href="http://www.css.com/">Zobacz inne efekty obrazu</a>
        <p>Stronę wykonał: Twój Numer PESEL</p>
    </footer>

    <script>
        function zastosujFiltr1() {
            const obraz = document.getElementById('img1');
            const opcje = document.getElementsByName('filtr');
            let wybranyFiltr = "";

            for (const opcja of opcje) {
                if (opcja.checked) {
                    wybranyFiltr = opcja.value;
                    break;
                }
            }

            if (wybranyFiltr === "blur") {
                obraz.style.filter = "blur(5px)";
            } else if (wybranyFiltr === "sepia") {
                obraz.style.filter = "sepia(100%)";
            } else if (wybranyFiltr === "invert") {
                obraz.style.filter = "invert(100%)";
            }
        }

        function ustawKolor() {
            document.getElementById('img2').style.filter = "grayscale(0%)";
        }

        function ustawCzarnoBialy() {
            document.getElementById('img2').style.filter = "grayscale(100%)";
        }

        function zastosujPrzezroczystosc() {
            const wartosc = document.getElementById('suwakPrzezroczystosc').value;
            document.getElementById('img3').style.filter = `opacity(${wartosc}%)`;
        }

        function zastosujJasnosc() {
            const wartosc = document.getElementById('suwakJasnosc').value;
            document.getElementById('img4').style.filter = `brightness(${wartosc}%)`;
        }
    </script>
</body>
</html>
